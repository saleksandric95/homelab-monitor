name: Build and Deploy Metrics Collector

on:
  push:
    branches: [main]
    paths:
      - 'metrics-collector/**'

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: ./metrics-collector
          platforms: linux/amd64,linux/arm64
          push: true
          tags: s4pynk0/homelab-metrics:latest

      - name: Deploy to Linux Mint
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.MINT_HOST }}
          username: ${{ secrets.MINT_USER }}
          key: ${{ secrets.MINT_SSH_KEY }}
          script: |
            sudo k3s kubectl set image deployment/metrics-collector \
              metrics-collector=s4pynk0/homelab-metrics:latest